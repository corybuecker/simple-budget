services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:trixie
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    command: sleep infinity
    volumes:
      - ..:/workspaces/simple-budget
    network_mode: service:postgresql
  postgresql:
    image: postgres@sha256:8ff36f3c66371cba71d20ceedccfc3de9669a68737607888c4ef0af93abe8e39
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: simple_budget
    volumes:
      - ../migrations/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
