name: CI
on: push
jobs:
  backend:
    runs-on: ubuntu-latest
    container: elixir:1.9.1
    services:
      postgres:
        image: postgres:10-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
        - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
    - uses: actions/checkout@master
    - name: Install BE dependencies
      env:
        MIX_ENV: test
      run: |
        mix local.rebar --force
        mix local.hex --force
        mix deps.get
        mix deps.compile
    - name: Run tests
      env:
        MIX_ENV: test
        TEST_DATABASE_URL: ecto://postgres:postgres@postgres:5432/simple_budget_test
      run: |
        mix test
        mix credo --strict
  frontend:
    runs-on: ubuntu-latest
    container: node:11.15.0
    steps:
    - uses: actions/checkout@master
    - name: Install Dependencies
      run: |
        cd assets
        npm install
    - name: Compile Assets
      run: |
        cd assets
        npm run deploy