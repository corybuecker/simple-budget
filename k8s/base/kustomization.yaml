apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: simple-budget

resources:
  - namespace.yaml
  - configmap.yaml
  - networkpolicies.yaml
  - httproute.yaml

configMapGenerator:
  - name: simple-budget-hostname
    envs:
      - hostname.env
    options:
      disableNameSuffixHash: true

secretGenerator:
  - name: simple-budget-secrets
    envs:
      - secrets.env
    options:
      disableNameSuffixHash: true

replacements:
  - source:
      kind: ConfigMap
      name: simple-budget-hostname
      fieldPath: data.HOSTNAME
    targets:
      - select:
          kind: HTTPRoute
          name: simple-budget
        fieldPaths:
          - spec.hostnames.0
      - select:
          kind: ConfigMap
          name: simple-budget-config
        fieldPaths:
          - data.GOOGLE_CALLBACK_URL
        options:
          delimiter: "/"
          index: 2
