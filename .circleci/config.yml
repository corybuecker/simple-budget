version: 2.1
orbs:
  heroku: circleci/heroku@0.0.6
jobs:  
  build:
    parallelism: 1
    docker:
      - image: circleci/elixir:1.8.1
        environment:
          MIX_ENV: test
      - image: circleci/postgres:9.6-alpine

    working_directory: ~/app

    steps:
      - checkout

      - run: mix local.hex --force
      - run: mix local.rebar --force

      - restore_cache:
          keys:
            - v1.8.1-mix-cache-{{ checksum "mix.lock" }}

      - run: mix do deps.get, compile

      - save_cache:
          key: v1.8.1-mix-cache-{{ checksum "mix.lock" }}
          paths:
            - "deps"
            - "_build"

      - run: mix ecto.create

      - run: mix credo --strict

      - run: mix coveralls.circle
  deploy:
    executor: heroku/default
    steps:
      - checkout
      - heroku/install
      - heroku/deploy-via-git:
          only-branch: master
workflows:
  build-deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build
