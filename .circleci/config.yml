version: 2.1
jobs:  
  build:
    parallelism: 1
    docker:
      - image: circleci/elixir:1.9.0
        environment:
          MIX_ENV: test
      - image: circleci/postgres:11-alpine

    working_directory: ~/app

    steps:
      - checkout

      - run: mix local.hex --force
      - run: mix local.rebar --force

      - restore_cache:
          keys:
            - v1.9.0-mix-cache-{{ checksum "mix.lock" }}

      - run: mix do deps.get, compile

      - save_cache:
          key: v1.9.0-mix-cache-{{ checksum "mix.lock" }}
          paths:
            - "deps"
            - "_build"

      - run: mix ecto.create

      - run: mix credo --strict

      - run: mix coveralls.circle
